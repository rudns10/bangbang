spring.application.name=backend
server.port=3000

# === PostgreSQL ===
# DB: bangbang / 유저: bangbang
# 비밀번호는 git에 안 올림 → application-local.properties (gitignore) 에서 주입
spring.datasource.url=jdbc:postgresql://localhost:5432/bangbang
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=bangbang
# spring.datasource.password 는 application-local.properties 에 둠

# application-local.properties 가 있으면 덮어씀 (없어도 기동은 됨)
spring.config.import=optional:application-local.properties

# === JPA / Hibernate ===
# update: 엔티티 변경 시 스키마 자동 반영, 데이터는 보존 (재시작해도 유지)
# Phase 3에서 Flyway/Liquibase 마이그레이션으로 전환 예정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
